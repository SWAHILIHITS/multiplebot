# fly.toml app configuration file generated for multiplebot on 2026-05-12T11:01:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'multiplebot'
primary_region = 'ams'

[build]

[build.settings]
  pythonbase = "3.11-slim"

[[restart]]
  policy = "on-failure"
  retries = 1
  processes = ["app"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
  size = 'shared-cpu-2x'
